# ── Display (nice!view e-ink) ──────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Widgets shown on screen (used by nice!view custom status screen)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# ── Bluetooth ──────────────────────────────────────────────────────
# Boost TX power to +8 dBm for better wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── Power management ───────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
# Deep sleep after 30 min idle (default is 15 min = 900000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ── Mouse / pointing ───────────────────────────────────────────────
CONFIG_ZMK_POINTING=y

# ── Identity ───────────────────────────────────────────────────────
CONFIG_ZMK_KEYBOARD_NAME="Silakka54"

# ── ZMK Studio (real-time keymap editing over USB) ─────────────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_TRANSPORT_UART=n
